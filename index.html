<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>森林數學樂園 — 國小數學闖關</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#FFF1DF; --bg2:#FCE3C4; --card:#FFFCF7;
    --ink:#8A5638; --ink-soft:#B98A63; --muted:#A98C72;
    --berry:#F2913D; --berry-dk:#C96E1F;        /* 低年級 */
    --batch:#2FA98C; --batch-dk:#1F7A63;        /* 中年級 */
    --plum:#9C6B9E; --plum-dk:#7E4F80;          /* 高年級 */
    --ok:#3C9A5F;
    --line:#EFD3A2;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; min-height:100vh;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--ink);
    background:radial-gradient(125% 120% at 50% 0%,var(--bg1),var(--bg2));
    padding:0 18px 56px;
  }

  /* ---------- 頁首 / 招牌 ---------- */
  header{max-width:920px;margin:0 auto;text-align:center;padding:46px 0 14px;}
  .crest{
    font-size:54px;line-height:1;margin-bottom:6px;
    animation:bob 3.4s ease-in-out infinite;
  }
  h1{
    font-family:"Fredoka",sans-serif;font-weight:700;
    font-size:clamp(30px,7vw,46px);margin:2px 0 4px;color:var(--ink);
    letter-spacing:1px;
  }
  .tagline{
    font-size:clamp(14px,3.6vw,17px);font-weight:500;color:var(--ink-soft);
    margin:0 auto;max-width:30em;line-height:1.6;
  }
  .leaf-rule{
    display:flex;align-items:center;justify-content:center;gap:10px;
    margin:22px auto 4px;color:var(--batch);font-size:13px;
  }
  .leaf-rule::before,.leaf-rule::after{
    content:"";height:2px;width:46px;border-radius:2px;
    background:linear-gradient(90deg,transparent,var(--line));
  }
  .leaf-rule::after{background:linear-gradient(90deg,var(--line),transparent);}
  .leaf-rule span{font-weight:700;letter-spacing:3px;color:var(--ink-soft);}

  /* ---------- 卡片區 ---------- */
  .shelf{
    max-width:920px;margin:14px auto 0;
    display:grid;gap:20px;
    grid-template-columns:repeat(auto-fit,minmax(248px,1fr));
  }
  .card{
    position:relative;display:flex;flex-direction:column;
    background:var(--card);border-radius:22px;
    border:2px solid var(--line);
    box-shadow:0 10px 26px rgba(138,86,56,.10);
    overflow:hidden;text-decoration:none;color:inherit;
    opacity:0;transform:translateY(14px);
    animation:rise .6s cubic-bezier(.2,.7,.3,1) forwards;
  }
  .card:nth-child(1){animation-delay:.05s;}
  .card:nth-child(2){animation-delay:.15s;}
  .card:nth-child(3){animation-delay:.25s;}

  /* 招牌頂條（糖果遮陽棚） */
  .awning{
    height:14px;
    background:repeating-linear-gradient(90deg,var(--c),var(--c) 16px,#fff5 16px,#fff5 32px);
  }
  .card-body{padding:22px 22px 20px;display:flex;flex-direction:column;flex:1;}
  .grade-eyebrow{
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:13px;
    letter-spacing:1px;color:var(--c-dk);text-transform:uppercase;margin-bottom:2px;
  }
  .mascot{font-size:46px;line-height:1;margin:2px 0 8px;}
  .card h2{
    font-family:"Fredoka",sans-serif;font-weight:700;font-size:23px;
    margin:0 0 4px;color:var(--ink);
  }
  .venue{font-size:14px;font-weight:700;color:var(--c-dk);margin:0 0 12px;}
  .topics{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 20px;}
  .chip{
    font-size:12.5px;font-weight:500;color:var(--ink);
    background:var(--c-soft);border:1px solid var(--c-line);
    border-radius:999px;padding:4px 11px;
  }
  .cta{
    margin-top:auto;display:inline-flex;align-items:center;justify-content:center;gap:7px;
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:17px;
    color:#fff;background:linear-gradient(180deg,var(--c-lite),var(--c));
    border-radius:999px;padding:12px 18px;
    box-shadow:0 6px 14px var(--c-glow);
  }
  .cta .arrow{transition:transform .18s;}

  /* 互動：可玩卡片 */
  .card.play{cursor:pointer;transition:transform .16s,box-shadow .2s,border-color .2s;}
  .card.play:hover,.card.play:focus-visible{
    transform:translateY(-5px);border-color:var(--c);
    box-shadow:0 16px 34px rgba(138,86,56,.18);outline:none;
  }
  .card.play:hover .cta .arrow,.card.play:focus-visible .cta .arrow{transform:translateX(4px);}

  /* 即將開幕卡片 */
  .card.soon{filter:saturate(.55);}
  .card.soon .card-body{opacity:.78;}
  .card.soon .cta{
    background:#fff;color:var(--c-dk);
    border:2px dashed var(--c);box-shadow:none;cursor:default;
  }
  .ribbon{
    position:absolute;top:16px;right:-34px;transform:rotate(38deg);
    background:var(--c);color:#fff;font-family:"Fredoka",sans-serif;
    font-weight:600;font-size:12px;letter-spacing:1px;
    padding:5px 38px;box-shadow:0 4px 10px rgba(0,0,0,.12);
  }

  /* 年級配色 */
  .lower{--c:var(--berry);--c-dk:var(--berry-dk);--c-lite:#F6A858;
    --c-soft:#FFF1E2;--c-line:#F6D9BC;--c-glow:rgba(242,145,61,.4);}
  .middle{--c:var(--batch);--c-dk:var(--batch-dk);--c-lite:#46B884;
    --c-soft:#E5F6F1;--c-line:#BEE6DC;--c-glow:rgba(47,169,140,.4);}
  .upper{--c:var(--plum);--c-dk:var(--plum-dk);--c-lite:#B083B2;
    --c-soft:#F3EBF4;--c-line:#E0CDE1;--c-glow:rgba(156,107,158,.4);}

  footer{
    max-width:920px;margin:34px auto 0;text-align:center;
    font-size:13px;color:var(--muted);line-height:1.8;
  }
  footer .note{font-weight:500;}

  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-8px) rotate(2deg);}}
  @keyframes rise{to{opacity:1;transform:translateY(0);}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
    .card{opacity:1;transform:none;}
  }
</style>
</head>
<body>

  <header>
    <div class="crest">🌳🍪</div>
    <h1>森林數學樂園</h1>
    <p class="tagline">國小數學闖關練習，邊玩邊學。<br>選一個年級，走進屬於你的那一區吧！</p>
    <div class="leaf-rule"><span>選擇年級</span></div>
  </header>

  <main class="shelf">

    <!-- 低年級：連到森林點心舖（請上傳遊戲檔並命名為 lowergrades-math.html） -->
    <a class="card play lower" href="lowergrades-math.html">
      <div class="awning"></div>
      <div class="card-body">
        <div class="grade-eyebrow">1–2 年級</div>
        <div class="mascot">🐱🍪</div>
        <h2>國小低年級數學</h2>
        <p class="venue">森林點心舖</p>
        <div class="topics">
          <span class="chip">數數與數感</span>
          <span class="chip">加減法</span>
          <span class="chip">湊十・退位</span>
          <span class="chip">位值</span>
          <span class="chip">錢幣</span>
          <span class="chip">乘法入門</span>
        </div>
        <span class="cta">開始遊戲 <span class="arrow">→</span></span>
      </div>
    </a>

    <!-- 中年級：連到中年級數學（請上傳遊戲檔並命名為 middlegrades-math.html） -->
    <a class="card play middle" href="middlegrades-math.html">
      <div class="awning"></div>
      <div class="card-body">
        <div class="grade-eyebrow">3–4 年級</div>
        <div class="mascot">🦊🧁</div>
        <h2>國小中年級數學</h2>
        <p class="venue">森林市集</p>
        <div class="topics">
          <span class="chip">乘除法</span>
          <span class="chip">分數</span>
          <span class="chip">周長・面積</span>
          <span class="chip">時間</span>
        </div>
        <span class="cta">開始遊戲 <span class="arrow">→</span></span>
      </div>
    </a>

    <!-- 高年級：即將開幕 -->
    <div class="card soon upper" aria-disabled="true">
      <span class="ribbon">即將開幕</span>
      <div class="awning"></div>
      <div class="card-body">
        <div class="grade-eyebrow">5–6 年級</div>
        <div class="mascot">🦉🍰</div>
        <h2>國小高年級數學</h2>
        <p class="venue">籌備中的新店面</p>
        <div class="topics">
          <span class="chip">小數運算</span>
          <span class="chip">比與比例</span>
          <span class="chip">體積</span>
          <span class="chip">統計圖表</span>
        </div>
        <span class="cta">敬請期待</span>
      </div>
    </div>

  </main>

  <footer>
    <p class="note">更多年級的關卡陸續開放中 🌱</p>
    <p>森林數學樂園 · 給國小孩子的數學練習</p>
  </footer>

</body>
</html>
